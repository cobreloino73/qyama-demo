// EVM curve data for CT-2025-001
const evmData=Array.from({length:20},(_, i)=>{
  const p=i+1;const t=p/28;
  const bcws=Math.round(142e6*(1-Math.exp(-3*t))*(.6+.4*t));
  const bcwp=Math.round(bcws*(p<10?.95:p<15?.88:.82));
  const acwp=Math.round(bcwp/(p<10?1.02:p<15?.92:.88));
  return{period:p,date:`2024-${String(3+Math.floor((p-1)/2)).padStart(2,'0')}`,bcws,bcwp,acwp};
});

function Sidebar({page,setPage,collapsed,toggle}){
  return(
    <aside style={{width:collapsed?64:220,background:C.bg.secondary,borderRight:`1px solid ${C.border.default}`,display:'flex',flexDirection:'column',transition:'width .2s',overflow:'hidden',flexShrink:0}}>
      <div style={{padding:collapsed?'16px 8px':'20px',borderBottom:`1px solid ${C.border.default}`,display:'flex',alignItems:'center',gap:12,minHeight:64}}>
        <div style={{width:36,height:36,borderRadius:8,background:`linear-gradient(135deg,${C.copper},${C.copperDark})`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:F.heading,fontWeight:700,fontSize:16,color:'#fff',flexShrink:0}}>Q</div>

      </div>
      <nav style={{flex:1,padding:'12px 8px',display:'flex',flexDirection:'column',gap:2}}>
        {NAV.map(n=>{
          const active=page===n.id;
          return(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{display:'flex',alignItems:'center',gap:12,padding:collapsed?'10px 0':'10px 12px',justifyContent:collapsed?'center':'flex-start',background:active?C.bg.selected:'transparent',border:'none',borderRadius:8,cursor:'pointer',color:active?C.copper:C.text.secondary,fontSize:14,fontFamily:F.body,fontWeight:active?500:400,width:'100%',borderLeft:active?`3px solid ${C.copper}`:'3px solid transparent'}}>

              {!collapsed&&<span>{n.label}</span>}
            </button>
          );
        })}

      <button onClick={toggle} style={{padding:12,border:'none',cursor:'pointer',background:'transparent',color:C.text.muted,borderTop:`1px solid ${C.border.default}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <Icon type={collapsed?'chevR':'chevL'} size={18}/>
      </button>
    </aside>
  );
}

// DASHBOARD PAGE
// ═══════════════════════════════════════════
function DashboardPage(){
  const totalAmount=contracts.reduce((s,c)=>s+c.amount,0);
  const totalAlerts=contracts.reduce((s,c)=>s+c.open_alerts,0);
  const totalSNC=contracts.reduce((s,c)=>s+c.open_snc,0);
  const critAlerts=alerts.filter(a=>a.severity==='critical'&&a.status==='open').length;
  const avgCPI=(contracts.reduce((s,c)=>s+c.cpi,0)/contracts.length).toFixed(2);
  const avgSPI=(contracts.reduce((s,c)=>s+c.spi,0)/contracts.length).toFixed(2);

  const stats=[
    {label:'Contratos Activos',value:contracts.length,sub:'portafolio total',color:C.copper},
    {label:'Monto Comprometido',value:fmt(totalAmount),sub:`${contracts.length} contratos`,color:C.status.info},
    {label:'Alertas Abiertas',value:totalAlerts,sub:`${critAlerts} críticas`,color:C.status.critical},
    {label:'SNC Pendientes',value:totalSNC,sub:'notas de cambio',color:C.status.medium},
    {label:'CPI Promedio',value:avgCPI,sub:avgCPI<1?'sobrecosto':'en presupuesto',color:perfColor(parseFloat(avgCPI))},
    {label:'SPI Promedio',value:avgSPI,sub:avgSPI<1?'atrasado':'en plazo',color:perfColor(parseFloat(avgSPI))},
  ];

  const recentAlerts=alerts.filter(a=>a.status==='open').slice(0,5);
  const riskContracts=[...contracts].sort((a,b)=>b.risk-a.risk).slice(0,5);

  return(
    <div>
      <div style={{marginBottom:24}}>
        <h1 style={{fontFamily:F.heading,fontSize:24,fontWeight:600,color:C.text.primary}}>Dashboard</h1>
        <p style={{fontSize:13,color:C.text.muted,marginTop:4}}>Minera Cumbre — Vista General del Portafolio</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:24}}>
        {stats.map((s,i)=>(
          <div key={i} style={{padding:'16px 20px',background:C.bg.card,border:`1px solid ${C.border.default}`,borderRadius:12,borderLeft:`4px solid ${s.color}`}}>
            <div style={{fontSize:11,color:C.text.muted,marginBottom:6}}>{s.label}</div>
            <div style={{fontSize:26,fontFamily:F.heading,fontWeight:700,color:s.color}}>{s.value}</div>
            <div style={{fontSize:11,color:C.text.muted,marginTop:4}}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:C.bg.card,border:`1px solid ${C.border.default}`,borderRadius:12,padding:20}}>
          <h3 style={{fontFamily:F.heading,fontSize:14,fontWeight:600,color:C.text.primary,marginBottom:16}}>Alertas Recientes</h3>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {recentAlerts.map(a=>(
              <div key={a.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:C.bg.tertiary,borderRadius:8,borderLeft:`3px solid ${sevColor(a.severity)}`}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:C.text.primary,fontWeight:500}}>{a.title}</div>
                  <div style={{fontSize:10,color:C.text.muted,marginTop:2}}>{a.contract_title} • {a.agent}</div>
                </div>
                <span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:`${sevColor(a.severity)}20`,color:sevColor(a.severity),fontWeight:600,textTransform:'uppercase'}}>{a.severity}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{background:C.bg.card,border:`1px solid ${C.border.default}`,borderRadius:12,padding:20}}>
          <h3 style={{fontFamily:F.heading,fontSize:14,fontWeight:600,color:C.text.primary,marginBottom:16}}>Contratos Mayor Riesgo</h3>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {riskContracts.map(c=>(
              <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:C.bg.tertiary,borderRadius:8}}>
                <div style={{width:36,height:36,borderRadius:8,background:`${riskColor(c.risk)}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:riskColor(c.risk),fontFamily:F.heading}}>{c.risk}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:C.text.primary,fontWeight:500}}>{c.title}</div>
                  <div style={{fontSize:10,color:C.text.muted,marginTop:2}}>{c.contractor} • CPI {c.cpi} • SPI {c.spi}</div>
                </div>
                <div style={{display:'flex',gap:4}}>
                  {c.open_alerts>0&&<span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:`${C.status.critical}20`,color:C.status.critical,fontWeight:600}}>{c.open_alerts} alertas</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ALERTS PAGE

function AlertsPage(){
  const [filter,setFilter]=useState({severity:'',type:''});
  const filtered=alerts.filter(a=>{
    if(filter.severity&&a.severity!==filter.severity)return false;
    if(filter.type&&a.type!==filter.type)return false;
    return true;
  });
  const bySev=['critical','high','medium','info'].map(s=>({severity:s,count:alerts.filter(a=>a.severity===s&&a.status!=='resolved').length})).filter(s=>s.count>0);

  return(
    <div>
      <div style={{marginBottom:20}}>
        <h1 style={{fontFamily:F.heading,fontSize:24,fontWeight:600,color:C.text.primary}}>Centro de Alertas</h1>
        <p style={{fontSize:13,color:C.text.muted,marginTop:4}}>{filtered.length} alertas{filter.severity||filter.type?' (filtradas)':''}</p>
      </div>
      <div style={{display:'flex',gap:12,marginBottom:20}}>
        {bySev.map(s=>(
          <div key={s.severity} onClick={()=>setFilter(f=>({...f,severity:f.severity===s.severity?'':s.severity}))} style={{padding:'12px 20px',borderRadius:10,background:`${sevColor(s.severity)}10`,border:`1px solid ${sevColor(s.severity)}30`,display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
            <Icon type="alert" size={18} color={sevColor(s.severity)}/>
            <div>
              <div style={{fontSize:22,fontFamily:F.heading,fontWeight:600,color:sevColor(s.severity)}}>{s.count}</div>
              <div style={{fontSize:11,color:C.text.muted,textTransform:'capitalize'}}>{s.severity}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{key:'severity',label:'Severidad',opts:['critical','high','medium','info']},{key:'type',label:'Tipo',opts:['plazo','costo','legal','calidad','recursos']}].map(f=>(
          <select key={f.key} value={filter[f.key]} onChange={e=>setFilter(p=>({...p,[f.key]:e.target.value}))} style={{padding:'8px 12px',background:C.bg.card,border:`1px solid ${C.border.default}`,borderRadius:8,color:C.text.primary,fontSize:13,fontFamily:F.body,cursor:'pointer',outline:'none'}}>
            <option value="">{f.label}: Todas</option>
            {f.opts.map(o=><option key={o} value={o}>{o}</option>)}

        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.map(a=>(
          <div key={a.id} style={{display:'flex',alignItems:'flex-start',gap:14,padding:'14px 18px',background:C.bg.card,border:`1px solid ${C.border.default}`,borderRadius:10,borderLeft:`4px solid ${sevColor(a.severity)}`}}>
            <Icon type="alert" size={18} color={sevColor(a.severity)}/>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:14,color:C.text.primary,fontWeight:500}}>{a.title}</span>
                <span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:`${sevColor(a.severity)}20`,color:sevColor(a.severity),fontWeight:600,textTransform:'uppercase'}}>{a.severity}</span>
                <span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:C.bg.tertiary,color:C.text.muted,fontWeight:600}}>{a.type}</span>
              </div>

              <div style={{fontSize:11,color:C.text.muted,marginTop:6,display:'flex',alignItems:'center',gap:4}}>

// SVG CHART COMPONENT (pure, no deps)
// ═══════════════════════════════════════════
function SCurveChart({data,width=760,height=320}){
  const [hover,setHover]=useState(null);
  const pad={top:20,right:30,bottom:40,left:60};
  const w=width-pad.left-pad.right;
  const h=height-pad.top-pad.bottom;
  const maxVal=Math.max(...data.map(d=>Math.max(d.PV,d.EV,d.AC)));
  const yMax=Math.ceil(maxVal/10)*10;
  const xScale=(i)=>pad.left+(i/(data.length-1))*w;
  const yScale=(v)=>pad.top+h-(v/yMax)*h;
  const line=(key)=>data.map((d,i)=>`${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(d[key]).toFixed(1)}`).join(' ');
  const yTicks=Array.from({length:6},(_, i)=>Math.round(yMax*i/5));
  const series=[{key:'PV',color:'#3B82F6',label:'Valor Planificado (BCWS)'},{key:'EV',color:'#10B981',label:'Valor Ganado (BCWP)'},{key:'AC',color:'#EF4444',label:'Costo Real (ACWP)'}];

  return(
    <div style={{position:'relative'}}>
      <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{display:'block',maxWidth:'100%',height:'auto'}}>
        {yTicks.map(v=>(
          <Fragment key={v}>
            <line x1={pad.left} y1={yScale(v)} x2={pad.left+w} y2={yScale(v)} stroke={C.border.default} strokeWidth={1} strokeDasharray={v===0?'':'3,3'}/>
            <text x={pad.left-8} y={yScale(v)+4} fill={C.text.muted} fontSize={10} textAnchor="end" fontFamily={F.mono}>${v}M</text>
          </Fragment>
        ))}
        {data.map((d,i)=>(
          i%3===0&&<text key={i} x={xScale(i)} y={height-pad.bottom+20} fill={C.text.muted} fontSize={10} textAnchor="middle" fontFamily={F.mono}>P{i+1}</text>
        ))}
        {series.map(s=>(
          <path key={s.key} d={line(s.key)} fill="none" stroke={s.color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
        ))}
        {data.map((d,i)=>series.map(s=>(
          <circle key={s.key+i} cx={xScale(i)} cy={yScale(d[s.key])} r={hover===i?5:3} fill={s.color} stroke={C.bg.card} strokeWidth={2} style={{transition:'r 0.15s'}}/>
        )))}
        {data.map((d,i)=>(
          <rect key={i} x={xScale(i)-15} y={pad.top} width={30} height={h} fill="transparent" onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)} style={{cursor:'crosshair'}}/>
        ))}
        {hover!==null&&(
          <line x1={xScale(hover)} y1={pad.top} x2={xScale(hover)} y2={pad.top+h} stroke={C.text.muted} strokeWidth={1} strokeDasharray="4,4" opacity={0.5}/>
        )}
      </svg>
      {hover!==null&&(
        <div style={{position:'absolute',top:10,right:10,background:C.bg.secondary,border:`1px solid ${C.border.default}`,borderRadius:8,padding:'10px 14px',fontSize:11,pointerEvents:'none',zIndex:10}}>
          <div style={{fontWeight:600,color:C.text.primary,marginBottom:6}}>Período {hover+1}</div>
          {series.map(s=>(
            <div key={s.key} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
              <div style={{width:8,height:8,borderRadius:4,background:s.color}}/>
              <span style={{color:C.text.secondary}}>{s.label}:</span>
              <span style={{color:s.color,fontWeight:600,fontFamily:F.mono}}>${data[hover][s.key]}M</span>
            </div>
          ))}
        </div>
      )}
      <div style={{display:'flex',justifyContent:'center',gap:20,marginTop:12}}>
        {series.map(s=>(
          <div key={s.key} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:C.text.secondary}}>
            <div style={{width:16,height:3,borderRadius:2,background:s.color}}/>
            <span>{s.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// EVM PAGE
// ═══════════════════════════════════════════
function EVMPage(){
  const [sel,setSel]=useState('CT-2025-001');
  const c=contracts.find(x=>x.id===sel);
  const eac=Math.round(c.bac/c.cpi);
  const vac=c.bac-eac;
  const tcpi=((c.bac-(c.bac*c.progress*c.cpi))/(c.bac-(c.bac*c.progress))).toFixed(2);

  const chartData=evmData.map(d=>({name:`P${d.period}`,PV:Math.round(d.bcws/1e6),EV:Math.round(d.bcwp/1e6),AC:Math.round(d.acwp/1e6)}));

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <h1 style={{fontFamily:F.heading,fontSize:24,fontWeight:600,color:C.text.primary}}>Earned Value Management</h1>
          <p style={{fontSize:13,color:C.text.muted,marginTop:4}}>Curva S y métricas EVM</p>
        </div>
        <select value={sel} onChange={e=>setSel(e.target.value)} style={{padding:'8px 12px',background:C.bg.card,border:`1px solid ${C.border.default}`,borderRadius:8,color:C.text.primary,fontSize:13,fontFamily:F.body,cursor:'pointer',outline:'none'}}>
          {contracts.map(ct=><option key={ct.id} value={ct.id}>{ct.title}</option>)}
        </select>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10,marginBottom:20}}>
        {[
          {label:'BAC',value:fmt(c.bac),color:C.status.info},
          {label:'CPI',value:c.cpi.toFixed(2),color:perfColor(c.cpi)},
          {label:'SPI',value:c.spi.toFixed(2),color:perfColor(c.spi)},
          {label:'EAC',value:fmt(eac),color:eac>c.bac?C.status.critical:C.status.low},
          {label:'VAC',value:fmt(Math.abs(vac)),color:vac<0?C.status.critical:C.status.low},
          {label:'TCPI',value:tcpi,color:parseFloat(tcpi)>1.2?C.status.critical:C.status.medium},
        ].map((m,i)=>(
          <div key={i} style={{padding:'12px 16px',background:C.bg.card,border:`1px solid ${C.border.default}`,borderRadius:10,textAlign:'center'}}>
            <div style={{fontSize:10,color:C.text.muted,marginBottom:4}}>{m.label}</div>
            <div style={{fontSize:20,fontFamily:F.heading,fontWeight:700,color:m.color}}>{m.value}</div>
          </div>
        ))}
      </div>
      <div style={{background:C.bg.card,border:`1px solid ${C.border.default}`,borderRadius:12,padding:20}}>
        <h3 style={{fontFamily:F.heading,fontSize:14,fontWeight:600,color:C.text.primary,marginBottom:16}}>Curva S — {c.title}</h3>
        <SCurveChart data={chartData}/>
      </div>
    </div>
  );
}

  {id:'dashboard',icon:'dashboard',title:'Dashboard',color:'#3B82F6',content:`Panel principal con la vista consolidada del portafolio.\n\nMétricas clave:\n• Total de contratos activos y montos comprometidos\n• Alertas abiertas por severidad (crítica, alta, media, info)\n• Notas de cambio (SNC) pendientes\n• CPI y SPI promedio del portafolio\n\nUso recomendado: Revisar diariamente como punto de entrada para identificar temas que requieren atención inmediata.`},

// ═══════════════════════════════════════════
function App(){
  const [page,setPage]=useState('dashboard');
  const [collapsed,setCollapsed]=useState(false);
  const pages={dashboard:DashboardPage,cartera:CarteraPage,alertas:AlertsPage,evm:EVMPage,manual:ManualPage};
  const Page=pages[page]||DashboardPage;
  return(
    <div style={{display:'flex',height:'100vh',background:C.bg.primary}}>
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} toggle={()=>setCollapsed(!collapsed)}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{height:52,padding:'0 24px',borderBottom:`1px solid ${C.border.default}`,background:C.bg.secondary,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:13,color:C.text.muted}}>Minera Cumbre — Portafolio de Contratos</div>
          <div style={{fontSize:11,padding:'4px 10px',borderRadius:6,background:`${C.copper}15`,color:C.copper,fontWeight:600}}>DEMO v3.0</div>
        </div>
        <main style={{flex:1,overflow:'auto',padding:24,background:C.bg.primary}}>
          <Page/>
        </main>
      </div>
    </div>
  );
}
